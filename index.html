<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tastytrade × Amplitude</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0A0A0A;
  --black-2:#111111;
  --black-3:#1A1A1A;
  --black-4:#222222;
  --red:#E21E26;
  --red-dark:#B01820;
  --red-glow:rgba(226,30,38,0.15);
  --white:#FFFFFF;
  --white-90:rgba(255,255,255,0.9);
  --white-70:rgba(255,255,255,0.7);
  --white-50:rgba(255,255,255,0.5);
  --white-30:rgba(255,255,255,0.3);
  --white-10:rgba(255,255,255,0.1);
  --white-06:rgba(255,255,255,0.06);
  --white-03:rgba(255,255,255,0.03);
  --green:#22C55E;
  --green-bg:rgba(34,197,94,0.1);
  --amber:#F59E0B;
  --amber-bg:rgba(245,158,11,0.1);
  --border:rgba(255,255,255,0.08);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--black);color:var(--white);font-size:15px;line-height:1.6;overflow-x:hidden}

/* ─── TOPBAR ─── */
.topbar{
  padding:16px 48px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
  background:var(--black);
  position:sticky;top:0;z-index:100;
}
.topbar-logo{display:flex;align-items:center;gap:12px}
.tt-logo{
  background:var(--red);
  color:white;
  font-size:13px;
  font-weight:800;
  padding:5px 10px;
  border-radius:4px;
  letter-spacing:-0.3px;
}
.topbar-x{color:var(--white-30);font-size:14px;font-weight:300}
.amp-logo{color:var(--white-70);font-size:13px;font-weight:600;letter-spacing:0.2px}
.topbar-right{font-family:'DM Mono',monospace;font-size:10px;color:var(--white-30);letter-spacing:0.8px;text-transform:uppercase}

/* ─── HERO ─── */
.hero{
  padding:96px 48px 80px;
  max-width:960px;
  margin:0 auto;
  text-align:center;
}
.hero-kicker{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--red-glow);
  border:1px solid rgba(226,30,38,0.3);
  border-radius:20px;
  padding:6px 16px;
  font-size:11px;
  font-weight:700;
  color:var(--red);
  letter-spacing:1px;
  text-transform:uppercase;
  margin-bottom:32px;
}
.hero-kicker::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0}
.hero-h1{
  font-size:clamp(42px,6vw,68px);
  font-weight:900;
  line-height:1.02;
  letter-spacing:-2px;
  color:var(--white);
  margin-bottom:28px;
}
.hero-h1 .red{color:var(--red)}
.hero-h1 .dim{color:var(--white-50)}
.hero-sub{
  font-size:18px;
  font-weight:400;
  color:var(--white-70);
  max-width:620px;
  margin:0 auto 56px;
  line-height:1.7;
}
.hero-stats{
  display:flex;justify-content:center;gap:0;
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  max-width:640px;
  margin:0 auto;
}
.hero-stat{
  flex:1;
  padding:24px 20px;
  border-right:1px solid var(--border);
  text-align:center;
}
.hero-stat:last-child{border-right:none}
.hs-num{font-size:28px;font-weight:800;color:var(--white);letter-spacing:-1px;line-height:1}
.hs-num.red{color:var(--red)}
.hs-label{font-size:11px;color:var(--white-50);margin-top:6px;font-weight:500}

/* ─── SECTION DIVIDER ─── */
.divider{height:1px;background:var(--border);margin:0 48px}

/* ─── USE CASE BLOCKS ─── */
.uc-section{padding:0 48px;max-width:1160px;margin:0 auto}

.uc-block{
  padding:80px 0;
  border-bottom:1px solid var(--border);
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:72px;
  align-items:start;
}
.uc-block:last-child{border-bottom:none}
.uc-block.flip{direction:rtl}
.uc-block.flip > *{direction:ltr}

.uc-tag{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;font-weight:700;
  color:var(--white-50);
  text-transform:uppercase;
  letter-spacing:1.5px;
  margin-bottom:20px;
}
.uc-tag .num{
  background:var(--red);
  color:white;
  width:20px;height:20px;
  border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;
  flex-shrink:0;
}

.uc-h2{
  font-size:clamp(28px,3vw,38px);
  font-weight:800;
  line-height:1.1;
  letter-spacing:-1px;
  color:var(--white);
  margin-bottom:20px;
}
.uc-h2 .red{color:var(--red)}

.problem-box{
  background:rgba(226,30,38,0.06);
  border:1px solid rgba(226,30,38,0.2);
  border-radius:10px;
  padding:18px 20px;
  margin-bottom:28px;
}
.problem-label{
  font-size:10px;font-weight:700;
  color:var(--red);
  text-transform:uppercase;letter-spacing:1.5px;
  margin-bottom:8px;
  font-family:'DM Mono',monospace;
}
.problem-text{font-size:14px;color:var(--white-70);line-height:1.65}

.uc-body{font-size:15px;color:var(--white-60,rgba(255,255,255,0.6));line-height:1.75;margin-bottom:24px}

.uc-list{list-style:none;display:flex;flex-direction:column;gap:12px}
.uc-list li{
  display:flex;align-items:flex-start;gap:12px;
  font-size:14px;color:var(--white-70);
  line-height:1.5;
}
.uc-list li::before{
  content:'→';
  color:var(--red);
  font-weight:700;
  flex-shrink:0;
  margin-top:1px;
  font-family:'DM Mono',monospace;
}

/* ─── VISUAL CARDS ─── */
.viz{
  background:var(--black-3);
  border:1px solid var(--border);
  border-radius:14px;
  padding:28px;
  position:relative;
  overflow:hidden;
}
.viz::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--red);
  border-radius:14px 14px 0 0;
}
.viz-label{
  font-family:'DM Mono',monospace;
  font-size:10px;color:var(--white-40,rgba(255,255,255,0.4));
  text-transform:uppercase;letter-spacing:1.5px;
  margin-bottom:24px;
}

/* funnel */
.f-row{
  display:flex;align-items:center;gap:14px;
  padding:11px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.f-row:last-of-type{border-bottom:none}
.f-lbl{font-size:12px;color:var(--white-60,rgba(255,255,255,0.6));font-family:'DM Mono',monospace;width:130px;flex-shrink:0}
.f-track{flex:1;height:7px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden}
.f-fill{height:100%;border-radius:4px;background:var(--red);transition:width 0.3s}
.f-val{font-size:13px;font-weight:700;color:var(--white);width:38px;text-align:right;font-family:'DM Mono',monospace}
.f-drop{font-size:10px;color:var(--red);width:42px;text-align:right;font-family:'DM Mono',monospace;font-weight:600}

/* churn cards */
.churn-item{
  display:flex;align-items:center;gap:14px;
  padding:13px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.churn-item:last-child{border-bottom:none}
.c-av{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;
  flex-shrink:0;
  font-family:'DM Mono',monospace;
}
.c-av.red{background:rgba(226,30,38,0.2);color:#FCA5A5}
.c-av.amber{background:rgba(245,158,11,0.15);color:#FCD34D}
.c-av.green{background:rgba(34,197,94,0.15);color:#86EFAC}
.c-info{flex:1}
.c-name{font-size:13px;font-weight:600;color:var(--white-90)}
.c-detail{font-size:11px;color:var(--white-50);margin-top:2px}
.c-score{font-size:13px;font-weight:700;font-family:'DM Mono',monospace}
.c-score.red{color:#FCA5A5}
.c-score.amber{color:#FCD34D}
.c-score.green{color:#86EFAC}

/* guides */
.guide-item{
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);
  border-radius:10px;
  padding:18px;
  margin-bottom:12px;
}
.guide-item:last-child{margin-bottom:0}
.g-trigger{
  font-size:10px;font-weight:700;
  color:var(--red);
  text-transform:uppercase;letter-spacing:1px;
  margin-bottom:6px;
  font-family:'DM Mono',monospace;
}
.g-title{font-size:14px;font-weight:700;color:var(--white);margin-bottom:4px}
.g-desc{font-size:12px;color:var(--white-50);line-height:1.5}

/* product analytics bars */
.pa-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.pa-item:last-child{border-bottom:none}
.pa-feat{font-size:13px;color:var(--white-80,rgba(255,255,255,0.8));flex:1}
.pa-track{width:110px;height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.pa-fill{height:100%;border-radius:3px}
.pa-val{font-size:12px;font-family:'DM Mono',monospace;width:36px;text-align:right}

/* session replay */
.sr-item{
  padding:14px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.sr-item:last-child{border-bottom:none}
.sr-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sr-meta{font-size:11px;color:var(--white-40,rgba(255,255,255,0.4));font-family:'DM Mono',monospace}
.sr-tag{
  font-size:10px;font-weight:700;
  padding:3px 9px;border-radius:20px;
}
.tag-red{background:rgba(226,30,38,0.15);color:#FCA5A5}
.tag-amber{background:rgba(245,158,11,0.15);color:#FCD34D}
.tag-green{background:rgba(34,197,94,0.15);color:#86EFAC}
.sr-text{font-size:13px;color:var(--white-70);line-height:1.5}

/* attribution compare */
.attr-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.attr-col{background:rgba(255,255,255,0.03);border-radius:10px;padding:18px}
.attr-head{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;font-family:'DM Mono',monospace}
.attr-head.red{color:var(--red)}
.attr-head.green{color:var(--green)}
.attr-row{
  font-size:12px;color:var(--white-60,rgba(255,255,255,0.6));
  margin-bottom:8px;
  display:flex;align-items:flex-start;gap:8px;
  line-height:1.4;
}
.attr-row::before{font-size:11px;flex-shrink:0;margin-top:1px}
.attr-row.bad::before{content:'✗';color:var(--red)}
.attr-row.good::before{content:'✓';color:var(--green)}

/* AI insight box */
.ai-box{
  margin-top:20px;
  background:rgba(226,30,38,0.06);
  border:1px solid rgba(226,30,38,0.2);
  border-radius:8px;
  padding:14px 16px;
}
.ai-label{font-size:10px;font-weight:700;color:var(--red);font-family:'DM Mono',monospace;letter-spacing:1px;margin-bottom:4px}
.ai-text{font-size:12px;color:var(--white-70);line-height:1.55}
.ai-text strong{color:var(--white)}

/* ─── PULL QUOTE ─── */
.quote-wrap{
  padding:72px 48px;
  max-width:800px;
  margin:0 auto;
  text-align:center;
}
.qt{
  font-size:clamp(20px,2.5vw,27px);
  font-weight:600;
  color:var(--white-80,rgba(255,255,255,0.8));
  line-height:1.5;
  font-style:italic;
  margin-bottom:16px;
}
.qt-attr{font-size:12px;font-family:'DM Mono',monospace;color:var(--white-30);text-transform:uppercase;letter-spacing:1px}

/* ─── PROOF ─── */
.proof-wrap{
  background:var(--black-2);
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  padding:56px 48px;
}
.proof-inner{max-width:1160px;margin:0 auto}
.proof-eyebrow{
  font-size:11px;font-weight:700;
  color:var(--white-40,rgba(255,255,255,0.4));
  text-transform:uppercase;letter-spacing:2px;
  text-align:center;margin-bottom:36px;
  font-family:'DM Mono',monospace;
}
.proof-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.proof-card{
  background:var(--black-3);
  border:1px solid var(--border);
  border-radius:12px;
  padding:28px 24px;
  position:relative;overflow:hidden;
}
.proof-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--red);
}
.proof-num{
  font-size:42px;font-weight:900;
  letter-spacing:-2px;
  color:var(--white);
  line-height:1;
  margin-bottom:10px;
}
.proof-desc{font-size:13px;color:var(--white-60,rgba(255,255,255,0.6));line-height:1.55;margin-bottom:12px}
.proof-co{font-size:10px;font-family:'DM Mono',monospace;color:var(--white-30);text-transform:uppercase;letter-spacing:1px}

/* ─── NEXT STEPS ─── */
.next-wrap{padding:96px 48px;max-width:1000px;margin:0 auto;text-align:center}
.next-h2{
  font-size:clamp(32px,4vw,48px);
  font-weight:900;
  letter-spacing:-1.5px;
  color:var(--white);
  margin-bottom:14px;
}
.next-sub{font-size:16px;color:var(--white-50);margin-bottom:56px}

.next-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;text-align:left;margin-bottom:56px}
.next-card{
  background:var(--black-3);
  border:1px solid var(--border);
  border-radius:12px;
  padding:28px;
}
.next-n{
  font-size:13px;font-weight:800;
  color:var(--red);
  font-family:'DM Mono',monospace;
  margin-bottom:14px;
}
.next-title{font-size:16px;font-weight:700;color:var(--white);margin-bottom:8px;letter-spacing:-0.3px}
.next-desc{font-size:13px;color:var(--white-50);line-height:1.55}

.contact{font-size:14px;color:var(--white-40,rgba(255,255,255,0.4))}
.contact a{color:var(--white-70);text-decoration:none}
.contact a:hover{color:var(--white)}

/* ─── FOOTER ─── */
